<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ErasmusGo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Archivo',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#E9E5DC; }
  button { font-family: inherit; border:none; background:none; cursor:pointer; padding:0; color:inherit; }
  button:disabled { cursor:default; }
  img { display:block; }
  ::-webkit-scrollbar { width:0; height:0; }
  .row { display:flex; align-items:center; }
  .col { display:flex; flex-direction:column; }
  .between { justify-content:space-between; }
  .grow { flex:1; min-width:0; }
  .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mono { font-family:'Space Mono',ui-monospace,'SF Mono',Menlo,monospace; }
  @keyframes stampIn { 0% { transform:scale(1.6) rotate(8deg); opacity:0; } 100% { transform:scale(1) rotate(-8deg); opacity:1; } }
  .stamp-in { animation: stampIn .4s cubic-bezier(.2,1.4,.4,1) both; }
  @keyframes stampInBig { 0% { transform:scale(2.2) rotate(10deg); opacity:0; } 100% { transform:scale(1) rotate(-8deg); opacity:1; } }
  .stamp-in-big { animation: stampInBig .55s cubic-bezier(.2,1.4,.4,1) both; }
  @keyframes pop { 0% { transform:scale(.6); } 60% { transform:scale(1.15); } 100% { transform:scale(1); } }
  .pop { animation: pop .25s ease-out both; }
  @keyframes fadeUp { 0% { transform:translateY(10px); opacity:0; } 100% { transform:translateY(0); opacity:1; } }
  .fade-up { animation: fadeUp .35s ease-out both; }
  @keyframes growBar { 0% { width:0; } }
  .grow-bar { animation: growBar .8s cubic-bezier(.2,.8,.3,1) both; }
  @media (prefers-reduced-motion: reduce) { * { animation:none !important; transition:none !important; } }
  #noscript-msg { display:block; padding:40px; text-align:center; color:#1D2A50; font-size:14px; }
</style>
</head>
<body>
<div id="root"></div>
<div id="noscript-msg">Loading... If this message stays: open this file in Safari or Chrome (not inside the Mail or Files app), and make sure you have an internet connection.</div>
<script>
  window.addEventListener("error", function (e) {
    var n = document.getElementById("noscript-msg");
    if (n) n.style.display = "block";
  });
</script>
<script>
const { useState, createElement: e, Fragment } = React;

/* ---------- design tokens: "living travel document" ---------- */
const INK = "#1D2A50", INK_SOFT = "#E9ECF4";
const STAMP = "#D64B33", STAMP_SOFT = "#FAE9E4";
const SUN = "#E9A820", SUN_SOFT = "#FBF1D9";
const SKY = "#3F6BC9", SKY_SOFT = "#E7EDFA";
const MINT = "#2F9C6A", MINT_SOFT = "#E2F2E9";
const PAPER = "#F6F4EE", LINE = "#E7E3D8";
const TXT = "#1D2A50", SUB = "#7B7669";
const GOLD = "#B98410";

/* ---------- photos (Wikimedia Commons, free of rights) ---------- */
const IMG = {
  graslei: "https://commons.wikimedia.org/wiki/Special:FilePath/Graslei_Ghent.jpg?width=500",
  gravensteen: "https://commons.wikimedia.org/wiki/Special:FilePath/Gent_Burg_Gravensteen_09.jpg?width=500",
  belfort: "https://commons.wikimedia.org/wiki/Special:FilePath/Gent_Belfort.JPG?width=500",
  valencia: "https://commons.wikimedia.org/wiki/Special:FilePath/Ciudad_de_las_Artes_y_las_Ciencias.JPG?width=500",
  paris: "https://commons.wikimedia.org/wiki/Special:FilePath/Eiffel_Tower_20051010.jpg?width=500",
};

/* ---------- icons (no external libraries) ---------- */
function Icon({ name, size = 20, color = "currentColor" }) {
  const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round" };
  const paths = {
    home: [e("path", { key: 1, d: "M3 11.5 12 4l9 7.5" }), e("path", { key: 2, d: "M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9" })],
    calendar: [e("rect", { key: 1, x: 3, y: 5, width: 18, height: 16, rx: 2 }), e("path", { key: 2, d: "M3 9h18M8 3v4M16 3v4" })],
    chat: [e("path", { key: 1, d: "M21 12a8 8 0 1 1-3.2-6.4L21 4l-1 4.2A8 8 0 0 1 21 12Z" })],
    pin: [e("path", { key: 1, d: "M12 21s7-7.2 7-12a7 7 0 1 0-14 0c0 4.8 7 12 7 12Z" }), e("circle", { key: 2, cx: 12, cy: 9, r: 2.3 })],
    user: [e("circle", { key: 1, cx: 12, cy: 8, r: 3.5 }), e("path", { key: 2, d: "M5 20c1.2-3.5 4-5 7-5s5.8 1.5 7 5" })],
    search: [e("circle", { key: 1, cx: 11, cy: 11, r: 6.5 }), e("path", { key: 2, d: "M20 20l-4.3-4.3" })],
    chevron: [e("path", { key: 1, d: "M9 6l6 6-6 6" })],
    sparkles: [e("path", { key: 1, d: "M12 3v5M12 16v5M3 12h5M16 12h5M6 6l3 3M15 15l3 3M18 6l-3 3M9 15l-3 3" })],
    filecheck: [e("path", { key: 1, d: "M14 3H7a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8l-4-5Z" }), e("path", { key: 2, d: "M9.5 13l1.7 1.7L14.5 11" })],
    wallet: [e("rect", { key: 1, x: 3, y: 7, width: 18, height: 13, rx: 2 }), e("path", { key: 2, d: "M3 10h18M16 14h2" })],
    users: [e("circle", { key: 1, cx: 9, cy: 8, r: 3 }), e("path", { key: 2, d: "M3 19c.8-3 3-4.5 6-4.5s5.2 1.5 6 4.5" }), e("circle", { key: 3, cx: 17, cy: 9, r: 2.3 }), e("path", { key: 4, d: "M16 14.2c2.3.3 3.7 1.6 4.3 3.8" })],
    compass: [e("circle", { key: 1, cx: 12, cy: 12, r: 9 }), e("path", { key: 2, d: "M15 9l-2 6-6 2 2-6 6-2Z" })],
    plus: [e("path", { key: 1, d: "M12 5v14M5 12h14" })],
    building: [e("rect", { key: 1, x: 5, y: 3, width: 14, height: 18, rx: 1 }), e("path", { key: 2, d: "M9 7h.01M15 7h.01M9 11h.01M15 11h.01M9 15h.01M15 15h.01" })],
    coffee: [e("path", { key: 1, d: "M4 9h13v4a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V9Z" }), e("path", { key: 2, d: "M17 10h1.5a2 2 0 1 1 0 4H17" }), e("path", { key: 3, d: "M7 3c0 1-1 1-1 2M11 3c0 1-1 1-1 2" })],
    food: [e("path", { key: 1, d: "M6 3v8a2 2 0 0 0 4 0V3M8 11v10M16 3c-1.5 0-2.5 1.5-2.5 4s1 4 2.5 4v9" })],
    book: [e("path", { key: 1, d: "M4 5a2 2 0 0 1 2-2h6v17H6a2 2 0 0 1-2-2V5Z" }), e("path", { key: 2, d: "M12 3h6a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2h-6" })],
    party: [e("path", { key: 1, d: "M4 20l3-10 13-6-6 13-10 3Z" }), e("path", { key: 2, d: "M13 11l3 3" })],
    heart: [e("path", { key: 1, d: "M12 20s-7-4.4-9.3-8.8C1.4 8 3 5 6.2 5 8.4 5 10 6.3 12 8.5 14 6.3 15.6 5 17.8 5 21 5 22.6 8 21.3 11.2 19 15.6 12 20 12 20Z" })],
    star: [e("path", { key: 1, d: "M12 2.5l2.9 6 6.6.8-4.8 4.6 1.2 6.6L12 17.3 6.1 20.5l1.2-6.6-4.8-4.6 6.6-.8L12 2.5Z" })],
    back: [e("path", { key: 1, d: "M19 12H5M11 6l-6 6 6 6" })],
    scale: [e("path", { key: 1, d: "M12 3v18M5 8l3-4 3 4M16 8l3-4 3 4M3 8h6M16 8h6M5 8c0 3-2 5-2 5h4s-2-2-2-5ZM19 8c0 3-2 5-2 5h4s-2-2-2-5Z" })],
    check: [e("path", { key: 1, d: "M5 12.5l4.5 4.5L19 7" })],
    plane: [e("path", { key: 1, d: "M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z" })],
  };
  if (name === "star") return e("svg", { ...p, fill: color, stroke: "none" }, paths.star);
  if (name === "plane") return e("svg", { ...p, fill: color, stroke: "none", strokeWidth: 0 }, paths.plane);
  return e("svg", p, paths[name] || null);
}

/* ---------- illustrated avatar (no real photo, for privacy) ---------- */
function PersonAvatar({ size = 40, top = INK, skin = "#F0C29B", hair = "#5B4233" }) {
  return e("svg", { width: size, height: size, viewBox: "0 0 64 64", style: { borderRadius: "50%", flexShrink: 0, background: "white" } }, [
    e("circle", { key: 1, cx: 32, cy: 32, r: 32, fill: top, opacity: 0.14 }),
    e("circle", { key: 2, cx: 32, cy: 27, r: 12, fill: skin }),
    e("path", { key: 3, d: "M20 24c0-8 6-13 12-13s12 5 12 13c-3-2-6-3-12-3s-9 1-12 3Z", fill: hair }),
    e("path", { key: 4, d: "M14 58c2-10 9-16 18-16s16 6 18 16Z", fill: top }),
  ]);
}

function AvatarStack({ tones, size = 26, ring = INK }) {
  return e("div", { className: "row" },
    tones.map((t, i) =>
      e("div", { key: i, style: { marginLeft: i ? -9 : 0, borderRadius: "50%", border: "2px solid " + ring, lineHeight: 0 } }, e(PersonAvatar, { size, top: t }))
    )
  );
}

/* ---------- building blocks ---------- */
function TopBar({ title, onBack }) {
  return e("div", { className: "row", style: { gap: 8, padding: "16px 20px 12px", background: PAPER, position: "sticky", top: 0, zIndex: 10 } }, [
    onBack && e("button", { key: "b", onClick: onBack, style: { padding: 4, marginLeft: -4, borderRadius: 999 } }, e(Icon, { name: "back", size: 20, color: TXT })),
    e("h1", { key: "t", className: "grow", style: { fontSize: 19, fontWeight: 800, color: TXT, margin: 0, letterSpacing: -0.3 } }, title),
  ]);
}

function Eyebrow({ children, right }) {
  return e("div", { className: "row between", style: { marginBottom: 10 } }, [
    e("p", { key: 1, className: "mono", style: { fontSize: 10, fontWeight: 700, color: SUB, letterSpacing: 1.6, margin: 0, textTransform: "uppercase" } }, children),
    right ? e("span", { key: 2, className: "mono", style: { fontSize: 10, fontWeight: 700, color: TXT, letterSpacing: 1 } }, right) : null,
  ]);
}

function Card({ children, style, onClick, className }) {
  const base = { background: "white", borderRadius: 16, border: "1px solid " + LINE, padding: 14 };
  if (onClick) return e("button", { onClick, className, style: { ...base, textAlign: "left", width: "100%", ...style } }, children);
  return e("div", { className, style: { ...base, ...style } }, children);
}

function Pill({ children, color = INK, soft = INK_SOFT, solid = false }) {
  return e("span", { style: { fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 999, whiteSpace: "nowrap", background: solid ? color : soft, color: solid ? "white" : color, display: "inline-block" } }, children);
}

function Bar({ pct, color = STAMP, animate = false }) {
  return e("div", { style: { height: 6, borderRadius: 999, background: INK_SOFT, overflow: "hidden" } },
    e("div", { className: animate ? "grow-bar" : "", style: { height: "100%", width: pct + "%", borderRadius: 999, background: color, transition: "width .4s ease" } })
  );
}

function PrimaryButton({ children, onClick, disabled, style }) {
  return e("button", { onClick, disabled, style: { width: "100%", borderRadius: 14, padding: "14px 0", fontWeight: 700, fontSize: 14.5, background: disabled ? INK_SOFT : INK, color: disabled ? SUB : "white", transition: "background .2s", ...style } }, children);
}

/* ---------- stamp (the app's signature) ---------- */
function StampCircle({ label, state, sub }) {
  const done = state === "done", next = state === "next";
  const border = done ? "2.5px solid " + STAMP : next ? "2px dashed " + SUN : "2px dashed " + LINE;
  return e("div", { className: "col", style: { alignItems: "center", width: 76, flexShrink: 0, gap: 6 } }, [
    e("div", { key: 1, className: done ? "stamp-in" : "", style: { width: 56, height: 56, borderRadius: "50%", border, display: "flex", alignItems: "center", justifyContent: "center", background: done ? STAMP_SOFT : "white", transform: done ? "rotate(-8deg)" : "none" } },
      done ? e(Icon, { name: "check", size: 22, color: STAMP })
        : next ? e("span", { className: "mono", style: { fontSize: 12, fontWeight: 700, color: GOLD } }, sub || "")
        : e(Icon, { name: "star", size: 14, color: LINE })
    ),
    e("span", { key: 2, className: "mono", style: { fontSize: 8.5, fontWeight: 700, letterSpacing: 0.8, color: done ? TXT : SUB, textAlign: "center", lineHeight: 1.4 } }, label),
  ]);
}

/* ---------- city data ---------- */
const CITY_META = {
  gent: { name: "Ghent", country: "Belgium", flag: "\uD83C\uDDE7\uD83C\uDDEA", uni: "Ghent University" },
  valencia: { name: "Valencia", country: "Spain", flag: "\uD83C\uDDEA\uD83C\uDDF8", uni: "UPV Valencia" },
  paris: { name: "Paris", country: "France", flag: "\uD83C\uDDEB\uD83C\uDDF7", uni: "Sorbonne" },
};

const CITY_DATA = {
  gent: {
    name: "Ghent, Belgium", img: IMG.graslei, vibe: "Small, cozy, very student-minded",
    stats: { cost: "\u20AC\u20AC", nightlife: "Student vibe", lang: "NL/EN" },
    reviews: [
      { name: "Sara, Erasmus 2025", text: "Compact city, everything is reachable by bike. Tons of international students, so I made friends fast.", top: INK, rating: 5 },
      { name: "Tom, Erasmus 2024", text: "Quieter than Paris or Barcelona, but that's exactly what makes it cozy and affordable.", top: MINT, rating: 4 },
    ],
  },
  valencia: {
    name: "Valencia, Spain", img: IMG.valencia, vibe: "Sun, beach, buzzing nightlife",
    stats: { cost: "\u20AC\u20AC", nightlife: "Very active", lang: "ES" },
    reviews: [
      { name: "Lina, Erasmus 2025", text: "Best Erasmus city for atmosphere \u2014 something to do every night, with the beach right there.", top: STAMP, rating: 5 },
      { name: "Joren, Erasmus 2024", text: "Living costs were a bit higher than expected, but the experience was more than worth it.", top: SUN, rating: 5 },
    ],
  },
  paris: {
    name: "Paris, France", img: IMG.paris, vibe: "Big city, culture, fast pace",
    stats: { cost: "\u20AC\u20AC\u20AC", nightlife: "Endless choice", lang: "FR" },
    reviews: [
      { name: "Amelia, Erasmus 2023", text: "Amazing for culture and museums, but housing is pricier and it's less student-centered than smaller cities.", top: SKY, rating: 4 },
      { name: "Karim, Erasmus 2024", text: "Public transport is great, but it took more effort to find a close group of friends.", top: INK, rating: 3 },
    ],
  },
};

/* ---------- city match quiz scoring ---------- */
/* profiles: budget 0 tight / 1 comfortable / 2 flexible; nightlife 0 low / 1 mid / 2 high */
const CITY_PROFILE = {
  gent: { budget: 0, vibe: "cozy", night: 1 },
  valencia: { budget: 1, vibe: "beach", night: 2 },
  paris: { budget: 2, vibe: "city", night: 1 },
};
function scoreCities(a) {
  return Object.keys(CITY_PROFILE).map((key) => {
    const p = CITY_PROFILE[key];
    const budgetPts = Math.max(5, 35 - 15 * Math.abs(a.budget - p.budget));
    const vibePts = a.vibe === p.vibe ? 40 : 15;
    const nightPts = Math.max(5, 25 - 8 * Math.abs(a.night - p.night));
    return { key, pct: Math.min(98, budgetPts + vibePts + nightPts) };
  }).sort((x, y) => y.pct - x.pct);
}

/* ================= ONBOARDING ================= */
function StepDots({ step, total = 4 }) {
  return e("div", { className: "row", style: { gap: 6, justifyContent: "center" } },
    Array.from({ length: total }).map((_, i) =>
      e("div", { key: i, style: { width: i === step ? 18 : 6, height: 6, borderRadius: 999, background: i === step ? INK : LINE, transition: "all .25s" } })
    )
  );
}

function OptionCard({ icon, iconColor, iconBg, title, sub, selected, onClick }) {
  return e("button", { onClick, className: "row fade-up", style: { width: "100%", gap: 12, textAlign: "left", borderRadius: 16, padding: 14, background: "white", border: selected ? "2px solid " + INK : "1px solid " + LINE, boxShadow: selected ? "0 4px 14px rgba(29,42,80,0.12)" : "none", transition: "all .15s" } }, [
    e("div", { key: 1, style: { width: 44, height: 44, borderRadius: 12, background: iconBg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 } }, e(Icon, { name: icon, size: 20, color: iconColor })),
    e("div", { key: 2, className: "grow" }, [
      e("p", { key: 1, style: { fontSize: 14.5, fontWeight: 700, color: TXT, margin: 0 } }, title),
      e("p", { key: 2, style: { fontSize: 12, color: SUB, margin: "3px 0 0", lineHeight: 1.45 } }, sub),
    ]),
    e("div", { key: 3, style: { width: 22, height: 22, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", background: selected ? INK : "white", border: selected ? "none" : "2px solid " + LINE } },
      selected ? e(Icon, { name: "check", size: 13, color: "white" }) : null),
  ]);
}

const QUIZ = [
  { q: "What's your monthly budget like?", key: "budget", options: [
    { label: "Keeping it tight", sub: "Every euro counts", value: 0, tag: "\u20AC" },
    { label: "Comfortable", sub: "Room for fun, within reason", value: 1, tag: "\u20AC\u20AC" },
    { label: "Flexible", sub: "The experience comes first", value: 2, tag: "\u20AC\u20AC\u20AC" },
  ]},
  { q: "Pick your perfect afternoon", key: "vibe", options: [
    { label: "Beach & sunshine", sub: "Sea breeze, sand, sunset drinks", value: "beach", tag: "\u2600\uFE0E" },
    { label: "Museums & big-city buzz", sub: "Culture, metro rides, endless streets", value: "city", tag: "\u25A0" },
    { label: "Caf\u00E9 terraces in a cozy town", sub: "Everything close by, familiar faces", value: "cozy", tag: "\u2665\uFE0E" },
  ]},
  { q: "How important is nightlife?", key: "night", options: [
    { label: "Essential", sub: "The nights make the semester", value: 2, tag: "\u2605" },
    { label: "Nice to have", sub: "Sometimes out, sometimes chill", value: 1, tag: "\u25D1" },
    { label: "Not really my thing", sub: "Give me daytime plans", value: 0, tag: "\u263E" },
  ]},
];

function OnboardingFlow({ onDone }) {
  const [step, setStep] = useState(0);          // 0 welcome, 1 journey, 2 branch, 3 stamp
  const [journey, setJourney] = useState(null); // 'compare' | 'prep' | 'arrived'
  const [city, setCity] = useState(null);
  const [quizIdx, setQuizIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [picked, setPicked] = useState(null);   // flash selection in quiz
  const [matches, setMatches] = useState(null);

  const wrap = (children) => e("div", { className: "col", style: { minHeight: "100%", background: PAPER, padding: "20px 24px 24px" } }, children);

  /* ----- step 0: welcome ----- */
  if (step === 0) return wrap([
    e("div", { key: "top", className: "grow col", style: { justifyContent: "center", gap: 0 } }, [
      e("div", { key: "ticket", className: "fade-up", style: { position: "relative", borderRadius: 22, overflow: "hidden", background: INK, padding: "26px 22px 22px" } }, [
        e("div", { key: 1, className: "row between" }, [
          e("span", { key: 1, className: "mono", style: { fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "rgba(255,255,255,0.6)" } }, "BOARDING PASS"),
          e(Icon, { key: 2, name: "plane", size: 20, color: SUN }),
        ]),
        e("p", { key: 2, style: { color: "white", fontWeight: 800, fontSize: 27, margin: "16px 0 6px", letterSpacing: -0.6, lineHeight: 1.15 } }, "Your Erasmus,\nall in one place."),
        e("p", { key: 3, style: { color: "rgba(255,255,255,0.7)", fontSize: 13.5, margin: 0, lineHeight: 1.55 } }, "Compare cities, meet students, find your spots and collect stamps along the way."),
        e("div", { key: 4, style: { position: "relative", margin: "20px -22px 14px" } }, [
          e("div", { key: 1, style: { borderTop: "2px dashed rgba(255,255,255,0.3)" } }),
          e("div", { key: 2, style: { position: "absolute", left: -9, top: -9, width: 18, height: 18, borderRadius: "50%", background: PAPER } }),
          e("div", { key: 3, style: { position: "absolute", right: -9, top: -9, width: 18, height: 18, borderRadius: "50%", background: PAPER } }),
        ]),
        e("div", { key: 5, className: "row between" }, [
          e("span", { key: 1, className: "mono", style: { fontSize: 10, fontWeight: 700, letterSpacing: 1.5, color: "rgba(255,255,255,0.6)" } }, "PASSENGER: YOU"),
          e("span", { key: 2, className: "mono", style: { fontSize: 10, fontWeight: 700, letterSpacing: 1.5, color: SUN } }, "GATE: OPEN"),
        ]),
      ]),
      e("div", { key: "stamps", className: "row", style: { gap: 10, justifyContent: "center", marginTop: 26, opacity: 0.9 } }, [
        e(StampCircle, { key: 1, label: "ARRIVAL", state: "done" }),
        e(StampCircle, { key: 2, label: "FIRST TRIP", state: "done" }),
        e(StampCircle, { key: 3, label: "20 WEEKS", state: "next", sub: "?" }),
      ]),
    ]),
    e(PrimaryButton, { key: "cta", onClick: () => setStep(1) }, "Get started"),

/* ================= GET SET (checklist) ================= */
function ChecklistScreen() {
  const [items, setItems] = useState([
    { t: "Learning agreement signed", done: true },
    { t: "EHIC health insurance card", done: true },
    { t: "Registered with the city", done: true },
    { t: "Local SIM or EU data plan", done: true },
    { t: "Bank account opened", done: true },
    { t: "Rental contract checked", done: false },
    { t: "Student card picked up", done: false },
    { t: "Grant documents uploaded", done: false },
  ]);
  const doneCount = items.filter(i => i.done).length;
  const allDone = doneCount === items.length;
  const toggle = (idx) => setItems(items.map((it, i) => i === idx ? { ...it, done: !it.done } : it));
  const sorted = items.map((it, idx) => ({ ...it, idx })).sort((a, b) => Number(a.done) - Number(b.done));
  return e("div", { style: { paddingBottom: 100, background: PAPER, minHeight: "100%" } }, [
    e(TopBar, { key: "top", title: "Get set" }),
    e("div", { key: "body", style: { padding: "4px 20px 0" } }, [
      e(Card, { key: "progress" }, [
        e(Eyebrow, { key: 1, right: doneCount + "/" + items.length }, "Your Erasmus checklist"),
        e(Bar, { key: 2, pct: (doneCount / items.length) * 100, color: allDone ? MINT : STAMP }),
        e("p", { key: 3, style: { fontSize: 12, color: SUB, margin: "8px 0 0" } },
          allDone ? "All set. Time to live it up! \uD83C\uDF89" : "Great pace \u2014 " + (items.length - doneCount) + " left and you're fully set."),
      ]),
      e(Card, { key: "assist", className: "row", style: { display: "flex", alignItems: "center", gap: 12, padding: 12, marginTop: 10 } }, [
        e("div", { key: 1, style: { width: 40, height: 40, borderRadius: 999, display: "flex", alignItems: "center", justifyContent: "center", background: INK_SOFT, flexShrink: 0 } }, e(Icon, { name: "sparkles", size: 18, color: INK })),
        e("div", { key: 2, className: "grow" }, [
          e("p", { key: 1, style: { fontSize: 14, fontWeight: 700, color: TXT, margin: 0 } }, "Ask the assistant"),
          e("p", { key: 2, style: { fontSize: 12, color: SUB, margin: 0 } }, "Visa, health insurance, bank account\u2026"),
        ]),
        e(Icon, { key: 3, name: "chevron", size: 16, color: SUB }),
      ]),
      e("div", { key: "eb", style: { margin: "18px 0 0" } }, e(Eyebrow, null, "Still to do")),
      e("div", { key: "list", className: "col", style: { gap: 8 } },
        sorted.map((it) =>
          e("button", { key: it.t, onClick: () => toggle(it.idx), className: "row", style: { width: "100%", gap: 12, textAlign: "left", borderRadius: 14, padding: 13, background: "white", border: "1px solid " + LINE, opacity: it.done ? 0.65 : 1 } }, [
            e("div", { key: 1, className: it.done ? "pop" : "", style: { width: 26, height: 26, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", background: it.done ? MINT : "white", border: it.done ? "none" : "2px dashed " + SUB } },
              it.done ? e(Icon, { name: "check", size: 14, color: "white" }) : null),
            e("span", { key: 2, className: "grow", style: { fontSize: 13.5, fontWeight: 600, color: TXT } }, it.t),
          ])
        )
      ),
    ]),
  ]);
}

/* ================= APP SHELL ================= */
function ErasmusApp() {
  const [session, setSession] = useState(null); // { mode, cityKey, matches }
  const [screen, setScreen] = useState("home");
  const [cityKey, setCityKey] = useState(null); // for city detail screen
  const tabs = [
    { key: "home", icon: "home", label: "Home" },
    { key: "travel", icon: "calendar", label: "Trips" },
    { key: "chat", icon: "chat", label: "Chat" },
    { key: "spots", icon: "pin", label: "Spots" },
    { key: "profile", icon: "user", label: "Profile" },
  ];

  function openCity(key) { setCityKey(key); setScreen("cityDetail"); }
  function go(target) {
    if (target.indexOf("cityDetail:") === 0) { openCity(target.split(":")[1]); return; }
    setScreen(target);
  }
  function handleSetCity(key) { setSession({ ...session, mode: "prep", cityKey: key }); setScreen("home"); }
  function handleRestart() { setSession(null); setScreen("home"); setCityKey(null); }

  const homeCity = session ? CITY_META[session.cityKey] : CITY_META.gent;

  function renderScreen() {
    switch (screen) {
      case "chat": return e(ChatScreen, { cityName: homeCity.name });
      case "spots": return e(SpotsScreen, { cityName: homeCity.name });
      case "travel": return e(TravelScreen);
      case "wonen": return e(HousingScreen, { cityName: homeCity.name });
      case "docs": return e(ChecklistScreen);
      case "discover": return e(DiscoverScreen, { go, cityName: homeCity.name });
      case "cities": return e(CitiesScreen, { go, openCity });
      case "cityDetail": return e(CityDetailScreen, { cityKey, go });
      case "profile": return e(ProfileScreen, { session, onRestart: handleRestart });
      default: return e(HomeScreen, { session, go, onSetCity: handleSetCity });
    }
  }

  return e("div", { style: { width: "100%", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px 0", background: "#E9E5DC" } },
    e("div", { style: { width: 380, height: 800, background: PAPER, borderRadius: 40, boxShadow: "0 24px 60px rgba(29,42,80,0.25)", border: "6px solid white", overflow: "hidden", position: "relative", display: "flex", flexDirection: "column" } }, [
      e("div", { key: "notch", style: { display: "flex", justifyContent: "center", paddingTop: 8, paddingBottom: 4, background: PAPER, flexShrink: 0 } }, e("div", { style: { width: 96, height: 20, background: INK, borderRadius: 999 } })),
      e("div", { key: "content", style: { flex: 1, overflowY: "auto", background: PAPER } },
        session ? renderScreen() : e(OnboardingFlow, { onDone: (s) => { setSession(s); setScreen("home"); } })
      ),
      session && e("div", { key: "nav", style: { position: "absolute", bottom: 0, left: 0, right: 0, background: "white", borderTop: "1px solid " + LINE, display: "flex", justifyContent: "space-between", padding: "10px 22px 14px" } },
        tabs.map((t) => {
          const active = screen === t.key;
          return e("button", { key: t.key, onClick: () => setScreen(t.key), className: "col", style: { alignItems: "center", gap: 3, width: 52 } }, [
            e(Icon, { key: 1, name: t.icon, size: 21, color: active ? INK : "#B9B4A6" }),
            e("span", { key: 2, style: { fontSize: 9.5, fontWeight: active ? 700 : 500, color: active ? INK : "#B9B4A6" } }, t.label),
            e("div", { key: 3, style: { width: 4, height: 4, borderRadius: 999, background: active ? SUN : "transparent" } }),
          ]);
        })
      ),
    ])
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(ErasmusApp));
